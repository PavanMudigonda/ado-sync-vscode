name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  release:
    name: Package & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      # ── Derive version from tag ──────────────────────────────────────────────
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Fail fast if package.json version doesn't match the tag ─────────────
      - name: Verify version matches tag
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TARGET="${{ steps.version.outputs.version }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            echo "ERROR: package.json version ($CURRENT) does not match tag ($TARGET)."
            echo "Bump the version in package.json before tagging."
            exit 1
          fi
          echo "Version check passed: $CURRENT"

      # ── Package .vsix ────────────────────────────────────────────────────────
      - name: Package extension
        run: npx vsce package --no-dependencies
        # produces ado-sync-vscode-<version>.vsix

      - name: Set vsix filename
        id: vsix
        run: echo "file=ado-sync-vscode-${{ steps.version.outputs.version }}.vsix" >> "$GITHUB_OUTPUT"

      # ── Publish to VS Code Marketplace ───────────────────────────────────────
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies --packagePath "${{ steps.vsix.outputs.file }}"

      # ── Create GitHub Release with .vsix attached ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.file }}
          body: |
            ## Install

            **From Marketplace** (recommended):
            ```
            Cmd+Shift+X → search "ado-sync" → Install
            ```

            **From `.vsix`** (manual):
            ```bash
            code --install-extension ${{ steps.vsix.outputs.file }}
            ```
